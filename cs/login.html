<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logga in — Steorn & Carlborg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1410;--paper:#f0f5f2;--sage:#3d5a4f;--sage2:#6a9e8e;
  --gold:#b8914a;--mid:rgba(240,245,242,.5);--line:rgba(61,90,79,.25);
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif;
}
html,body{height:100%;margin:0}
body{
  background:var(--ink);color:var(--paper);
  font-family:var(--sans);font-weight:300;
  display:flex;flex-direction:column;min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 55% 60% at 70% 40%,rgba(61,90,79,.14) 0%,transparent 60%);
}
main{
  flex:1;display:flex;justify-content:center;align-items:center;
  padding:2rem;position:relative;z-index:1;
}
.login-box{
  width:100%;max-width:380px;
}
.login-logo{
  font-family:var(--serif);font-size:1.5rem;font-weight:300;
  color:var(--paper);margin-bottom:.3rem;letter-spacing:.04em;
}
.login-logo em{font-style:normal;color:var(--sage2)}
.login-sub{
  font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--sage2);opacity:.7;margin-bottom:2.5rem;
}
.login-field{margin-bottom:1rem}
.login-field label{
  display:block;font-size:.65rem;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(240,245,242,.45);margin-bottom:.5rem;
}
.login-field input{
  width:100%;padding:.75rem 1rem;
  background:rgba(61,90,79,.08);
  border:1px solid var(--line);
  color:var(--paper);
  font-family:var(--sans);font-size:.95rem;font-weight:300;
  outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.login-field input:focus{border-color:var(--sage2)}
.login-field input::placeholder{color:rgba(240,245,242,.25)}
.login-btn{
  width:100%;margin-top:.5rem;
  padding:.8rem;
  background:var(--sage);color:var(--paper);border:none;
  font-family:var(--sans);font-size:.75rem;
  letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;transition:background .2s;
}
.login-btn:hover{background:var(--sage2)}
.login-error{
  margin-top:1rem;
  font-size:.8rem;color:#e07070;
  text-align:center;display:none;
}
.back-link{
  display:block;margin-top:1.5rem;text-align:center;
  font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(240,245,242,.3);text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--sage2)}
footer{
  padding:1.5rem;text-align:center;
  font-size:.65rem;color:rgba(240,245,242,.2);
  letter-spacing:.1em;position:relative;z-index:1;
}
</style>
</head>
<body>
<main>
  <div class="login-box">
    <div class="login-logo">Steorn <em>&</em> Carlborg</div>
    <div class="login-sub">Skyddad sektion</div>
    <div class="login-field">
      <label>Lösenord</label>
      <input type="password" id="pw" placeholder="••••••••" autofocus>
    </div>
    <button class="login-btn" id="loginBtn">Logga in</button>
    <div class="login-error" id="err">Felaktigt lösenord. Försök igen.</div>
    <a href="index.html" class="back-link">← Tillbaka</a>
  </div>
</main>
<footer>Steorn &amp; Carlborg · Stockholm &amp; Uppsala</footer>
<script>
const PW = 'SC2025';
const KEY = 'sc_auth';
const VAL = 'granted';

// Get redirect target from query string
function getNext() {
  const p = new URLSearchParams(window.location.search);
  return p.get('next') || 'steorn-carlborg.html';
}

// If already logged in, go straight through
if(sessionStorage.getItem(KEY) === VAL) {
  window.location.replace(getNext());
}

function attempt() {
  const val = document.getElementById('pw').value;
  if(val === PW) {
    sessionStorage.setItem(KEY, VAL);
    window.location.replace(getNext());
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('loginBtn').addEventListener('click', attempt);
document.getElementById('pw').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') attempt();
});
</script>
</body>
</html>
