<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1117; --paper:#f7f3ed; --gold:#b8914a; --gold-lt:#d4aa6a;
  --teal:#2a6b68; --rust:#8c3a2b; --muted:#6b6560; --line:rgba(184,145,74,0.2);
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Jost',sans-serif;
  --bg-page:#f5f0ea; --txt:#1a1612; --border:#e0d8cc;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg-page);
  color:var(--txt);
  font-family:var(--sans);
  font-weight:300;
  line-height:1.6;
}

/* ── NAV ── */
nav{
  position:sticky; top:0; z-index:100;
  display:flex; justify-content:space-between; align-items:center;
  padding:1.1rem 4rem;
  background:var(--ink);
  border-bottom:1px solid var(--line);
}
.nav-logo{font-family:var(--serif);font-size:1.05rem;letter-spacing:.12em;color:var(--gold);text-decoration:none;text-transform:uppercase}
nav a.nav-link{color:rgba(247,243,237,.65);text-decoration:none;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;transition:color .2s;margin-left:2rem}
nav a.nav-link:hover{color:var(--gold)}

/* ── HEADER ── */
.page-header{
  background:var(--ink);
  padding:4rem 4rem 3rem;
  border-bottom:1px solid var(--line);
}
.page-header h1{
  font-family:var(--serif);font-size:clamp(2.2rem,4vw,3.5rem);
  font-weight:300;color:var(--paper);margin-bottom:.5rem;
}
.page-header h1 em{font-style:italic;color:var(--gold)}
.page-header p{color:rgba(247,243,237,.5);font-size:.88rem;letter-spacing:.08em}

/* ── CONTROLS ── */
.controls{
  background:white;
  padding:1.5rem 4rem;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:2rem; flex-wrap:wrap;
  position:sticky; top:58px; z-index:50;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  padding:.35rem .9rem;
  border:1px solid var(--border);
  background:transparent;
  font-family:var(--sans);font-size:.72rem;
  letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;color:var(--muted);
  transition:all .2s; border-radius:1px;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:var(--ink);color:var(--gold);border-color:var(--ink)}
.filter-btn.active.f{background:var(--teal);border-color:var(--teal);color:white}
.filter-btn.active.l{background:#8c6230;border-color:#8c6230;color:white}
.filter-btn.active.o{background:var(--muted);border-color:var(--muted);color:white}

.search-wrap{flex:1;min-width:200px;max-width:360px;position:relative}
.search-wrap input{
  width:100%;
  padding:.45rem 1rem .45rem 2.2rem;
  border:1px solid var(--border);
  font-family:var(--sans);font-size:.85rem;
  background:white;color:var(--txt);
  outline:none;border-radius:1px;
}
.search-wrap input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}

.sort-select{
  padding:.4rem .8rem;border:1px solid var(--border);
  font-family:var(--sans);font-size:.78rem;background:white;
  color:var(--txt);cursor:pointer;border-radius:1px;
}
.result-count{
  font-size:.78rem;color:var(--muted);letter-spacing:.08em;
  margin-left:auto;white-space:nowrap;
}

/* ── TABLE ── */
.pub-container{padding:2rem 4rem 4rem}
.pub-table{width:100%;border-collapse:collapse}

.pub-table thead th{
  text-align:left;padding:.8rem 1rem;
  font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);border-bottom:2px solid var(--border);
  font-weight:400;cursor:pointer;user-select:none;
  white-space:nowrap;
}
.pub-table thead th:hover{color:var(--gold)}
.pub-table thead th.sorted{color:var(--gold)}
.pub-table thead th .sort-arrow{display:inline-block;margin-left:4px;opacity:.4}
.pub-table thead th.sorted .sort-arrow{opacity:1}

.pub-row{border-bottom:1px solid var(--border);transition:background .15s}
.pub-row:hover{background:rgba(184,145,74,.04)}

.pub-row td{padding:.9rem 1rem;vertical-align:top}

/* cite count */
.td-cite{
  font-family:var(--serif);
  font-size:1.4rem;font-weight:300;
  text-align:right;white-space:nowrap;
  color:var(--gold);min-width:4rem;
  padding-top:.95rem !important;
}
.td-cite.high{color:#8c6230;font-size:1.7rem}
.td-cite.medium{color:var(--gold)}
.td-cite.low{color:#b3a080;font-size:1.2rem}

/* title */
.td-title{min-width:280px}
.pub-title{
  font-family:var(--serif);font-size:1.02rem;
  font-weight:400;line-height:1.4;color:var(--txt);
  margin-bottom:.2rem;
}
.pub-journal{font-size:.78rem;color:var(--muted)}
.pub-journal span.jname{color:#5a4e40}

/* role badge */
.td-role{text-align:center;white-space:nowrap;padding-top:1rem !important}
.role-badge{
  display:inline-block;
  font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.2rem .55rem;border-radius:1px;
}
.rb-f{background:rgba(42,107,104,.12);color:var(--teal);border:1px solid rgba(42,107,104,.3)}
.rb-l{background:rgba(184,145,74,.12);color:#8c6230;border:1px solid rgba(184,145,74,.3)}
.rb-o{background:rgba(107,101,96,.1);color:var(--muted);border:1px solid rgba(107,101,96,.25)}

.td-year{color:var(--muted);font-size:.85rem;white-space:nowrap;padding-top:1rem !important;text-align:center}

/* empty state */
.empty-state{
  text-align:center;padding:5rem 2rem;color:var(--muted);
}
.empty-state p{font-family:var(--serif);font-size:1.5rem;font-weight:300;margin-bottom:.5rem}
.empty-state small{font-size:.85rem}

/* ── FOOTER ── */
footer{
  background:var(--ink);padding:2.5rem 4rem;
  display:flex;justify-content:space-between;align-items:center;
}
footer p{font-size:.78rem;color:rgba(247,243,237,.3);letter-spacing:.08em}
footer a{color:var(--gold);text-decoration:none;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase}

@media(max-width:768px){
  nav,footer,.page-header,.controls,.pub-container{padding-left:1.5rem;padding-right:1.5rem}
  .controls{gap:1rem;top:50px}
  .td-cite{min-width:2.5rem}
  .pub-table thead th:nth-child(4),
  .pub-table tbody .td-year{display:none}
}

/* ── BACK TO MAIN BUTTON ── */
.back-home{
  position:fixed;
  bottom:2rem;right:2rem;
  z-index:500;
  display:flex;align-items:center;gap:.6rem;
  padding:.65rem 1.2rem;
  background:rgba(13,17,23,.88);
  backdrop-filter:blur(10px);
  border:1px solid rgba(184,145,74,.3);
  color:rgba(242,237,230,.7);
  font-family:var(--sans);font-size:.68rem;
  letter-spacing:.14em;text-transform:uppercase;
  text-decoration:none;
  transition:all .25s;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.back-home:hover{
  border-color:var(--gold),#b8914a);
  color:var(--gold),#b8914a);
  background:rgba(13,17,23,.96);
}
.back-home svg{
  width:12px;height:12px;fill:currentColor;flex-shrink:0;
}

/* ── LOGOUT LINK ── */
.logout-link{
  font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(240,245,242,.3);text-decoration:none;
  transition:color .2s;cursor:pointer;
}
.logout-link:hover{color:#e07070}
</style>

const pubs = DATA.publications;

document.getElementById('headerMeta').textContent =
  `${pubs.length} publikationer (1998–2022) · ${DATA.total_cites.toLocaleString('sv-SE')} citeringar totalt · h-index ${DATA.h_index}`;

let currentRole = 'all';
let currentSearch = '';
let currentSort = 'citations-desc';

const roleClass = {'Förstaförfattare':'rb-f','Sistaförfattare':'rb-l','Övriga':'rb-o'};
const roleShort = {'Förstaförfattare':'Förstaförf.','Sistaförfattare':'Sistaförf.','Övriga':'Samförf.'};

function getCiteClass(c) {
  if (c >= 200) return 'high';
  if (c >= 50)  return 'medium';
  return 'low';
}

function getFiltered() {
  let arr = pubs;
  if (currentRole !== 'all') arr = arr.filter(p => p.role === currentRole);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    arr = arr.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.journal.toLowerCase().includes(q) ||
      p.first_author.toLowerCase().includes(q)
    );
  }
  const [field, dir] = currentSort.split('-');
  arr = [...arr].sort((a,b) => {
    const av = field === 'year' ? a.year : a.citations;
    const bv = field === 'year' ? b.year : b.citations;
    return dir === 'desc' ? bv - av : av - bv;
  });
  return arr;
}

function render() {
  const arr = getFiltered();
  const tbody = document.getElementById('pubTableBody');
  const empty = document.getElementById('emptyState');

  if (!arr.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('resultCount').textContent = '0 resultat';
    return;
  }
  empty.style.display = 'none';
  document.getElementById('resultCount').textContent = `${arr.length} publikationer`;

  // Trim journal string
  const jname = j => j.replace(/\s+\d+.*/, '').replace(/,$/, '').trim();

  tbody.innerHTML = arr.map(p => `
    <tr class="pub-row">
      <td class="td-cite ${getCiteClass(p.citations)}">${p.citations > 0 ? p.citations.toLocaleString('sv-SE') : '–'}</td>
      <td class="td-title">
        <div class="pub-title">${p.title}</div>
        <div class="pub-journal"><span class="jname">${jname(p.journal) || '—'}</span></div>
      </td>
      <td class="td-role"><span class="role-badge ${roleClass[p.role]}">${roleShort[p.role]}</span></td>
      <td class="td-year">${p.year}</td>
    </tr>
  `).join('');
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRole = btn.dataset.role;
    render();
  });
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentSearch = e.target.value.trim(); render(); }, 200);
});

// Sort
document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value; render();
});

// Column header sort
document.querySelectorAll('[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const field = th.dataset.sort;
    const [cf, cd] = currentSort.split('-');
    const newDir = cf === field && cd === 'desc' ? 'asc' : 'desc';
    currentSort = `${field}-${newDir}`;
    document.getElementById('sortSelect').value = currentSort;
    document.querySelectorAll('thead th .sort-arrow').forEach(a => a.textContent = '');
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = newDir === 'desc' ? ' ↓' : ' ↑';
    render();
  });
});

render();
</script>
